apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulsechat
  labels:
    app: pulsechat
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
spec:
  ingressClassName: nginx
  rules:
    - host: pulsechat.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: pulsechat-api
                port:
                  number: 4000
          - path: /presence
            pathType: Prefix
            backend:
              service:
                name: pulsechat-presence
                port:
                  number: 4002
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: pulsechat-ws-gateway
                port:
                  number: 4001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pulsechat-api
                port:
                  number: 4000
