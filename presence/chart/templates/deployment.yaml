apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsechat-presence
  labels:
    app: pulsechat-presence
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: pulsechat-presence
  template:
    metadata:
      labels:
        app: pulsechat-presence
    spec:
      containers:
        - name: presence
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 4002
          env:
            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV }}
            - name: PORT
              value: "4002"
            - name: REDIS_URL
              value: {{ .Values.env.REDIS_URL }}
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
