replicaCount: 1
image:
  repository: ghcr.io/sirvickky001/pulsechat-api
  tag: latest
  pullPolicy: Always
service:
  type: ClusterIP
  port: 4000
env:
  NODE_ENV: development
  PGHOST: postgres
  PGPORT: "5432"
  PGUSER: pulsechat
  PGDATABASE: pulsechat
  JWT_SECRET: dev-secret
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
